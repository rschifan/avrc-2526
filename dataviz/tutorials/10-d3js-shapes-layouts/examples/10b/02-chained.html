<body>
    <h1>10b §3 — Chained transitions</h1>
    <p class="lead">A transition can be followed by another transition; the second one starts when
        the first finishes. Three phases here: move right, then move up, then change colour.
        <a href="../../10b-transitions.html">Source tutorial &rarr;</a></p>

    <p><button id="go">Run the chain</button></p>
    <div id="demo"></div>
    <script>
        // ─────────────────────────────────────────────────────────────────────
        const c = makeCanvas("#demo", 200, { margin: { top: 20, right: 30, bottom: 20, left: 30 } });
        const dot = c.plot.append("circle")
            .attr("cx", 40).attr("cy", c.innerH - 30).attr("r", 18)
            .attr("fill", "#0072B2");
        document.getElementById("go").addEventListener("click", () => {
            dot.interrupt()
                .attr("cx", 40).attr("cy", c.innerH - 30).attr("fill", "#0072B2");
            dot.transition().duration(600)
                .attr("cx", c.innerW - 40)
                .transition().duration(600)
                .attr("cy", 30)
                .transition().duration(400)
                .attr("fill", "tomato");
        });
    </script>

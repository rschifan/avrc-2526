<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>10b §1 — basic transition</title>
    <style>
        body { max-width: 1100px; margin: 2em auto; padding: 0 1.5em;
            line-height: 1.55; color: #222; font-size: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        h1 { font-size: 1.4em; margin-bottom: 0.3em; }
        .lead { color: #555; margin-top: 0; }
        svg { width: 100%; height: auto; max-width: 100%; display: block;
            border: 1px solid #ddd; background: #fafafa; }
        button { padding: 0.4em 0.9em; font-size: 1em; cursor: pointer; }
        a { color: #0072B2; }
            .example-nav { margin-top: 2em; padding-top: 1em; border-top: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; gap: 1em; }
        .example-nav .spacer { flex: 1; }
        .example-nav a { text-decoration: none; }
        .example-nav a:hover { text-decoration: underline; }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="../_shared/utils.js"></script>
</head>
<body>
    <h1>10b §1 — Basic transition</h1>
    <p class="lead">The minimal call: <code>selection.transition().duration(750).attr("cx", &hellip;)</code>.
        D3 reads the current value at the start of the call and interpolates to the target over
        the given duration.
        <a href="../../10b-transitions.html">Source tutorial &rarr;</a></p>

    <p><button id="go">Move the dot</button></p>
    <div id="demo"></div>
    <script>
        // ─────────────────────────────────────────────────────────────────────
        const c = makeCanvas("#demo", 120, { margin: { top: 20, right: 30, bottom: 20, left: 30 } });
        const dot = c.plot.append("circle")
            .attr("cx", 30).attr("cy", c.innerH / 2).attr("r", 18)
            .attr("fill", "#0072B2");
        let toRight = true;
        document.getElementById("go").addEventListener("click", () => {
            dot.transition().duration(750)
                .attr("cx", toRight ? c.innerW - 30 : 30);
            toRight = !toRight;
        });
    </script>

    <nav class="example-nav">
        <span></span>
        <a href="../../index.html">L10 index</a>
        <span class="spacer"></span>
        <a href="02-chained.html">Next: §3 chained transitions &rarr;</a>
    </nav>
</body>
